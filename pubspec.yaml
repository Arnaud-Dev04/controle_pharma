name: controle_pharma
description: "Application de contrôle/audit de pharmacie - Comparaison stock théorique vs réel"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Gestion d'état
  provider: ^6.1.2

  # Base de données locale
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # Formatage des nombres et dates
  intl: ^0.20.2

  # Google Fonts pour une typographie premium
  google_fonts: ^6.2.1

  # Export PDF
  pdf: ^3.11.2
  printing: ^5.13.5

  # Graphiques et statistiques
  fl_chart: ^0.70.2

  # Partage de fichiers
  share_plus: ^10.1.4
  sqflite_common_ffi_web: ^1.1.1

  # Préférences persistantes (pour l'état de déverrouillage)
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  web:
    generate: true
    image_path: "icon.png"
